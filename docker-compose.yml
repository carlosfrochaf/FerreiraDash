services:
  postgres:
    image: postgres:16-alpine
    container_name: ferreira-rocha-db
    restart: unless-stopped
    environment:
      environment:
  POSTGRES_USER: ${DB_USER}
  POSTGRES_PASSWORD: ${DB_PASSWORD}
  POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - ferreira_rocha_pg:/var/lib/postgresql/data

volumes:
  ferreira_rocha_pg:
