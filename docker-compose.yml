services:
  postgres:
    image: postgres:16-alpine
    container_name: ferreira-rocha-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-ferreira_rocha}
    ports:
      - "5432:5432"
    volumes:
      - ferreira_rocha_pg:/var/lib/postgresql/data

volumes:
  ferreira_rocha_pg:
